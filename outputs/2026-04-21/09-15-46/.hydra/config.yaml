plugins:
  _target_: pytorch_lightning.plugins.DeepSpeedPlugin
  config: ${deepspeed_config_path}
logger:
  _target_: pytorch_lightning.loggers.TensorBoardLogger
  save_dir: ${output_directory}
  name: ${task}
  version: null
  log_graph: false
  default_hp_metric: true
  prefix: ''
trainer:
  _target_: pytorch_lightning.Trainer
  accelerator: null
  gpus: ${n_gpus}
  num_nodes: ${n_nodes}
  min_epochs: ${n_epochs}
  max_epochs: ${n_epochs}
  accumulate_grad_batches: ${acc_batches}
  gradient_clip_val: ${clip_grad}
  limit_val_batches: ${limit_val_batches}
  check_val_every_n_epoch: ${check_val_every_n_epoch}
  precision: 16
output_directory: tb_logs
deepspeed_config_path: ds_config.json
seed: 73
resume: false
batch_size: 64
n_epochs: 50
limit_val_batches: 1.0
n_buckets: 24
n_gpus: 1
n_nodes: 1
acc_batches: 8
accelerator: null
check_val_every_n_epoch: 1
data_path: null
vocabulary_path: bart_vocab_downstream.json
task: backward_prediction
augmentation_probability: 0.0
augmentation_strategy: null
data_device: cuda
model_path: null
model_type: bart
learning_rate: 0.001
weight_decay: 0.0
clip_grad: 1.0
d_model: 512
n_layers: 6
n_heads: 8
d_feedforward: 2048
train_tokens: null
train_mode: training
n_beams: 1
schedule: cycle
warm_up_steps: 8000
datamodule:
- SynthesisDataModule
callbacks:
- LearningRateMonitor
- ModelCheckpoint:
  - period: 1
  - monitor: validation_loss
- ValidationScoreCallback
- StepCheckpoint
- OptLRMonitor
scorers:
- FractionInvalidScore
- TopKAccuracyScore
